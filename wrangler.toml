name = "nozil-dev"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Production custom domain (config-as-code). The @astrojs/cloudflare adapter
# merges this into the generated dist/server/wrangler.json, so it flows through
# the workflow_dispatch production `wrangler deploy`. Apex is canonical — it
# matches `site: 'https://nozil.dev'` in astro.config.mjs. www → apex is a CF
# Single Redirect Rule (edge-level, no Worker), see docs/cloudflare.md.
# Note: adding this route needs a token with Zone → Workers Routes → Edit for
# the nozil.dev zone, not just account-level Workers scope.
routes = [{ pattern = "nozil.dev", custom_domain = true }]

# Adding `routes` flips Cloudflare's defaults for both of these to `false`.
# We keep version preview URLs on so `wrangler versions upload` (PR/main CI in
# deploy.yml) still returns a *.workers.dev URL to comment on PRs. workers_dev
# stays off: the apex is the sole production route (no duplicate-content URL).
preview_urls = true
workers_dev = false

# main + [assets] are generated by @astrojs/cloudflare into
# dist/server/wrangler.json at build time — do not set them here, or the
# Cloudflare Vite plugin tries to resolve dist/ before the build exists.

# Spam protection for /api/contact is handled by the honeypot field in the form.
# CF WAF rate limiting (Security → WAF) requires a paid plan — not configured here.
