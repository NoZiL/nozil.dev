name = "nozil-dev"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# main + [assets] are generated by @astrojs/cloudflare into
# dist/server/wrangler.json at build time — do not set them here, or the
# Cloudflare Vite plugin tries to resolve dist/ before the build exists.

# Spam protection for /api/contact is handled by the honeypot field in the form.
# CF WAF rate limiting (Security → WAF) requires a paid plan — not configured here.
