# pnpm 11 reads workspace-level settings from this file even in a single-package
# repo (no `packages:` list needed). `allowBuilds` replaces pnpm 10's
# onlyBuiltDependencies: allow native install scripts only for the toolchain
# deps that genuinely need them (everything else stays blocked — supply-chain
# hygiene).
allowBuilds:
  esbuild: true
  # lefthook: postinstall runs `lefthook install` to wire up the git hooks.
  lefthook: true
  puppeteer: true
  sharp: true
  workerd: true
minimumReleaseAgeExclude:
  - miniflare@4.20260617.0
  - wrangler@4.102.0
