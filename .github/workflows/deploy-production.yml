name: Deploy Production

# Manual promote to production (nozil.dev). Runs the CI gate, then deploys the
# Worker with the apex custom-domain route. Gated by the `production` GitHub
# environment — add required reviewers there for an approval step. This is a
# separate, dispatch-only workflow so it never shows as a skipped job on PRs.
on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nozil.dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Cloudflare Web Analytics beacon — baked into the build at build time.
      CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec wrangler deploy -c "$(node scripts/cf-config.mjs)"
