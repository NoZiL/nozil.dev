name: Deploy Production

# Manual promote to production (nozil.dev). Runs the CI gate, then deploys the
# Worker with the apex custom-domain route. Gated by the `production` GitHub
# environment — add required reviewers there for an approval step. This is a
# separate, dispatch-only workflow so it never shows as a skipped job on PRs.
on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nozil.dev
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Cloudflare Web Analytics beacon — baked into the build at build time.
      CF_BEACON_TOKEN: ${{ secrets.CF_BEACON_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec wrangler deploy -c "$(node scripts/cf-config.mjs)"
      # @astrojs/sitemap emits no <lastmod>, so the action's default
      # lastmod-required filter dropped every URL ("No candidate urls need to
      # submit"). Disable that filter to submit all sitemap URLs; api.indexnow.org
      # fans out to every IndexNow participant (Bing, Yandex, Seznam, Naver).
      - uses: bojieyang/indexnow-action@v3
        with:
          sitemap-location: 'https://nozil.dev/sitemap-0.xml'
          key: 'e16dc979212c4ded832d4d0805716198'
          endpoint: 'api.indexnow.org'
          lastmod-required: 'false'
