name: Deploy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: # manual production promote (Actions tab → Run workflow)

# One preview per ref; cancel superseded preview uploads.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write # to post the preview URL comment

jobs:
  # Ephemeral preview for PRs and for pushes to main (uploads a version,
  # does not shift production traffic).
  preview:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # astro-pdf snapshots /work → dist/client/cv.pdf with headless Chromium.
      # puppeteer's postinstall leaves a partial cache dir in CI (version folder
      # without the binary), so wipe it and install Chrome cleanly — otherwise
      # astro-pdf finds no browser and silently skips the PDF.
      - run: rm -rf ~/.cache/puppeteer && pnpm exec puppeteer browsers install chrome
      - run: pnpm build
      - name: Assert the CV PDF was generated
        run: test -f dist/client/cv.pdf || { echo "::error::astro-pdf did not produce dist/client/cv.pdf"; exit 1; }
      - name: Upload preview version
        id: preview
        run: |
          set -o pipefail
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — skipping preview deploy. Add repo secrets to enable."
            exit 0
          fi
          cfg=$(node scripts/cf-config.mjs)
          out=$(pnpm exec wrangler versions upload -c "$cfg" 2>&1 | tee /dev/stderr)
          url=$(printf '%s\n' "$out" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const marker = '<!-- preview-url -->';
            const body = `${marker}\n🚀 **Preview deployed:** ${url}\n\n_Updated for commit ${context.sha.slice(0, 7)}._`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # Production deploy — manual only. Promotes a fresh build to 100% traffic.
  production:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # See preview job: wipe the partial puppeteer cache dir and install Chrome
      # cleanly so astro-pdf can generate the build-time PDF CV.
      - run: rm -rf ~/.cache/puppeteer && pnpm exec puppeteer browsers install chrome
      - run: pnpm build
      - name: Assert the CV PDF was generated
        run: test -f dist/client/cv.pdf || { echo "::error::astro-pdf did not produce dist/client/cv.pdf"; exit 1; }
      - run: pnpm exec wrangler deploy -c "$(node scripts/cf-config.mjs)"
